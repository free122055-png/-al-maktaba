<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Soft circular white background with subtle outer shadow/border -->
  <circle cx="256" cy="256" r="248" fill="#FFFFFF" stroke="#D4AF37" stroke-width="3" />
  <circle cx="256" cy="256" r="238" fill="none" stroke="#064E3B" stroke-width="1.5" stroke-dasharray="8 4" />
  
  <!-- Outer Gold Mehrab / Arch Silhouette -->
  <path d="M 120 330 
           C 120 220, 160 140, 256 110 
           C 352 140, 392 220, 392 330" 
        fill="none" stroke="#D4AF37" stroke-width="6" stroke-linecap="round" />
  
  <!-- Mini Inner Dome Arch line -->
  <path d="M 150 330 
           C 150 240, 185 170, 256 145 
           C 327 170, 362 240, 362 330" 
        fill="none" stroke="#064E3B" stroke-width="2" stroke-linecap="round" opacity="0.6" />

  <!-- Hanging Golden Lantern (Fanoos) -->
  <!-- Hanging line -->
  <line x1="256" y1="110" x2="256" y2="185" stroke="#D4AF37" stroke-width="3.5" />
  
  <!-- Lantern cap -->
  <path d="M 244 185 L 268 185 L 256 172 Z" fill="#D4AF37" />
  <!-- Lantern body glass container -->
  <path d="M 243 185 L 269 185 L 264 215 L 248 215 Z" fill="#FFFBEB" stroke="#D4AF37" stroke-width="3" />
  <!-- Lantern inner glow / candle -->
  <circle cx="256" cy="200" r="4" fill="#FBBF24" />
  <!-- Lantern base -->
  <path d="M 246 215 L 266 215 L 256 225 Z" fill="#D4AF37" />
  
  <!-- Calligraphy Representation "المكتبة" stylized in Gold-Green -->
  <g transform="translate(112, 235)">
    <!-- Elegant custom vector representation of the Arabic text 'المكتبة' -->
    <!-- Alif-Lam-Meem-Kaf-Taa-Baa-Haa -->
    <!-- Green main strokes -->
    <path d="M 230 45 L 230 0" stroke="#064E3B" stroke-width="11" stroke-linecap="round" /> <!-- Alif -->
    <path d="M 214 45 L 214 -8 L 202 -8 L 202 45" fill="none" stroke="#064E3B" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" /> <!-- Lam -->
    
    <!-- Joined letters: Meem to Kaf to Taa to Baa to Haa -->
    <path d="M 200 40 
             C 185 28, 170 28, 155 40 
             C 140 40, 125 15, 110 35 
             L 90 35 
             C 80 15, 70 25, 60 40 
             L 45 40
             C 25 15, 10 25, 0 45" 
          fill="none" stroke="#064E3B" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Kaf upper stroke -->
    <path d="M 134 18 Q 115 5 95 18" fill="none" stroke="#064E3B" stroke-width="7" stroke-linecap="round" />
    
    <!-- Nuqtas (Dots) for Taa and Baa -->
    <circle cx="106" cy="3" r="5" fill="#064E3B" /> <!-- Taa dot 1 -->
    <circle cx="118" cy="3" r="5" fill="#064E3B" /> <!-- Taa dot 2 -->
    
    <circle cx="52" cy="55" r="5" fill="#064E3B" /> <!-- Baa dot -->
    <circle cx="19" cy="55" r="5" fill="#064E3B" /> <!-- Ya/Teh secondary dot -->
  </g>

  <!-- Open Quran / Book with Gold & Green Leaves fanning out -->
  <g transform="translate(112, 310)">
    <!-- Book shadow spine -->
    <path d="M 144 15 L 144 65" stroke="#1F2937" stroke-width="3" stroke-linecap="round" opacity="0.3" />
    
    <!-- Left pages (Green & Gold layers) -->
    <!-- Bottom layer: Gold -->
    <path d="M 144 55 Q 84 50 24 75 Q 74 35 144 43" fill="#D4AF37" opacity="0.75" />
    <!-- Mid layer: White -->
    <path d="M 144 48 Q 84 43 28 68 Q 78 28 144 36" fill="#F8FAFC" />
    <!-- Top layer: Deep Green -->
    <path d="M 144 40 Q 84 35 32 60 Q 82 20 144 28" fill="#064E3B" />

    <!-- Right pages (Green & Gold layers) -->
    <!-- Bottom layer: Gold -->
    <path d="M 144 55 Q 204 50 264 75 Q 214 35 144 43" fill="#D4AF37" opacity="0.75" />
    <!-- Mid layer: White -->
    <path d="M 144 48 Q 204 43 260 68 Q 210 28 144 36" fill="#F8FAFC" />
    <!-- Top layer: Deep Green -->
    <path d="M 144 40 Q 204 35 256 60 Q 206 20 144 28" fill="#064E3B" />
    
    <!-- Book wooden style base/stand -->
    <path d="M 144 55 L 104 88 L 64 82 L 144 55 Z" fill="#78350F" opacity="0.9" />
    <path d="M 144 55 L 184 88 L 224 82 L 144 55 Z" fill="#78350F" opacity="0.9" />
  </g>

  <!-- Beautiful Title "Al-Maktaba" in English serif typography -->
  <text x="256" y="442" 
        font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" 
        font-size="34" 
        font-weight="bold" 
        fill="#064E3B" 
        text-anchor="middle" 
        letter-spacing="1">Al-Maktaba</text>
        
  <!-- Small Elegant Diamond Marker -->
  <path d="M 256 460 L 261 465 L 256 470 L 251 465 Z" fill="#D4AF37" />
  <line x1="216" y1="465" x2="241" y2="465" stroke="#D4AF37" stroke-width="1.5" />
  <line x1="271" y1="465" x2="296" y2="465" stroke="#D4AF37" stroke-width="1.5" />
</svg>
